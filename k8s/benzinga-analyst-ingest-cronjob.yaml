# FIN-1071: Benzinga analyst-actions ingest (3x/day)
# Pre-market, midday, post-close — analyst actions cluster around open/close
apiVersion: batch/v1
kind: CronJob
metadata:
  name: benzinga-analyst-ingest
  namespace: qid
  labels:
    app: benzinga-analyst-ingest
    component: crucix
spec:
  schedule: "15 6,12,21 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: benzinga-analyst-ingest
            component: crucix
        spec:
          imagePullSecrets:
            - name: ghcr-pull
          restartPolicy: OnFailure
          containers:
            - name: ingest
              image: ghcr.io/blevinson/qid-intelligence-bridge:latest
              command:
                - python
                - /app/scripts/benzinga_analyst_ingest.py
              imagePullPolicy: Always
              env:
                - name: QID_DB_HOST
                  value: "qid-tsdb-rw.qid.svc.cluster.local"
                - name: QID_DB_PORT
                  value: "5432"
                - name: QID_DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: qid-tsdb-app
                      key: dbname
                - name: QID_DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: qid-tsdb-app
                      key: username
                - name: QID_DB_PASS
                  valueFrom:
                    secretKeyRef:
                      name: qid-tsdb-app
                      key: password
                - name: BENZINGA_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: crucix-api-keys
                      key: BENZINGA_API_KEY
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
