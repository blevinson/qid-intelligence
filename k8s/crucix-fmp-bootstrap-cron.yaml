# QIDP-226 — Refresh ticker_metadata from FMP profile-bulk.
#
# Initially: every 6 hours so we backfill parts 2-3 once the bulk endpoint's
# "updated once every few hours" window resets. UPSERTs are idempotent —
# safe to keep running. Once full universe is in place, switch schedule to
# weekly (e.g. "0 7 * * 0") to keep market_cap fresh.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: crucix-fmp-bootstrap
  namespace: qid
spec:
  schedule: "23 */6 * * *"   # 23 past every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: bootstrap
              image: ghcr.io/blevinson/qid-intelligence-bridge:claude-code-2026-04-30e
              command: ["python", "/scripts/fmp_bootstrap.py"]
              env:
                - { name: FMP_PARTS, value: "1,2,3" }
                - name: FMP_API_KEY
                  valueFrom: { secretKeyRef: { name: crucix-fmp, key: FMP_API_KEY } }
                - { name: QID_DB_HOST, value: qid-tsdb-rw.qid.svc.cluster.local }
                - { name: QID_DB_PORT, value: "5432" }
                - name: QID_DB_NAME
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: dbname } }
                - name: QID_DB_USER
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: username } }
                - name: QID_DB_PASS
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: password } }
              volumeMounts:
                - { name: script, mountPath: /scripts }
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits:   { cpu: 500m, memory: 512Mi }
          volumes:
            - name: script
              configMap: { name: fmp-bootstrap-script, defaultMode: 0755 }
