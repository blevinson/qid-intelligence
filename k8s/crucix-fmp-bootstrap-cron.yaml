# QIDP-226 — Refresh ticker_metadata from FMP profile-bulk.
#
# Cadence: monthly. Sector/industry/is_etf/country barely change. Only
# market_cap drifts daily — but the breakout universe filter at $2B
# tolerates 30-day lag for now (a name graduating from $1.9B to $2.1B
# during a month gets picked up next refresh). When that drift becomes
# costly, derive market_cap from Alpaca closes × cached shares_outstanding
# instead of bumping FMP cadence.
#
# Set to monthly 2026-05-01 after FMP plan hit rolling-30-day cap (QIDP-230
# context). 4 calls/month is sub-noise on any plan tier.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: crucix-fmp-bootstrap
  namespace: qid
spec:
  schedule: "0 5 1 * *"   # 05:00 UTC on the 1st of every month
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: bootstrap
              image: ghcr.io/blevinson/qid-intelligence-bridge:claude-code-2026-04-30e
              command: ["python", "/scripts/fmp_bootstrap.py"]
              env:
                - { name: FMP_PARTS, value: "0,1,2,3" }
                - name: FMP_API_KEY
                  valueFrom: { secretKeyRef: { name: crucix-fmp, key: FMP_API_KEY } }
                - { name: QID_DB_HOST, value: qid-tsdb-rw.qid.svc.cluster.local }
                - { name: QID_DB_PORT, value: "5432" }
                - name: QID_DB_NAME
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: dbname } }
                - name: QID_DB_USER
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: username } }
                - name: QID_DB_PASS
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: password } }
              volumeMounts:
                - { name: script, mountPath: /scripts }
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits:   { cpu: 500m, memory: 512Mi }
          volumes:
            - name: script
              configMap: { name: fmp-bootstrap-script, defaultMode: 0755 }
