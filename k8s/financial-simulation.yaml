apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-simulation
  namespace: qid
  labels:
    app: financial-simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: financial-simulation
  template:
    metadata:
      labels:
        app: financial-simulation
    spec:
      containers:
        - name: financial-simulation
          image: ghcr.io/blevinson/qid-intelligence-finsim:latest
          env:
            - name: NEO4J_URI
              value: "bolt://neo4j.qid.svc.cluster.local:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: NEO4J_AUTH
            - name: GRAPHITI_GROUP_ID
              value: "qid_intelligence"
            - name: QID_DB_HOST
              value: "qid-tsdb-rw.qid.svc.cluster.local"
            - name: QID_DB_PORT
              value: "5432"
            - name: QID_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: qid-tsdb-app
                  key: dbname
            - name: QID_DB_USER
              valueFrom:
                secretKeyRef:
                  name: qid-tsdb-app
                  key: username
            - name: QID_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: qid-tsdb-app
                  key: password
            - name: OPENAI_API_KEY
              value: "sk-proxy"
            - name: OPENAI_BASE_URL
              value: "http://azure-anthropic-proxy.cloudtorch.svc.cluster.local:4000/v1"
            - name: LLM_MODEL
              value: "gpt-5.4-mini"
            - name: SIM_ROUNDS
              value: "3"
            - name: SIM_POLL_INTERVAL
              value: "600"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      imagePullSecrets:
        - name: ghcr-pull
