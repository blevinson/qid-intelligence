# FIN-1072: Daily SEC CIK→ticker lookup refresh
# Runs at 05:00 UTC daily (before 8-K ingest)
# Source: https://www.sec.gov/files/company_tickers.json (~10K rows)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sec-cik-ticker-ingest
  namespace: qid
  labels:
    app: sec-cik-ticker-ingest
    component: crucix
spec:
  schedule: "0 5 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300  # 5 min max
      template:
        metadata:
          labels:
            app: sec-cik-ticker-ingest
            component: crucix
        spec:
          imagePullSecrets:
            - name: ghcr-pull
          restartPolicy: OnFailure
          containers:
            - name: ingest
              image: ghcr.io/blevinson/qid-intelligence-bridge:latest
              command:
                - python
                - /app/scripts/sec_cik_ticker_ingest.py
              imagePullPolicy: Always
              env:
                - name: QID_DB_HOST
                  value: "qid-tsdb-rw.qid.svc.cluster.local"
                - name: QID_DB_PORT
                  value: "5432"
                - name: QID_DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: qid-tsdb-app
                      key: dbname
                - name: QID_DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: qid-tsdb-app
                      key: username
                - name: QID_DB_PASS
                  valueFrom:
                    secretKeyRef:
                      name: qid-tsdb-app
                      key: password
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
