# Daily refresh of alpaca_assets — drives the alpaca_x_industry view.
# Daily is plenty: list churns slowly (corporate actions, new listings).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: alpaca-assets-ingest
  namespace: qid
spec:
  schedule: "37 11 * * *"   # 11:37 UTC daily (post US-pre-market window)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: ingest
              image: ghcr.io/blevinson/qid-intelligence-bridge:claude-code-2026-04-30e
              command: ["python", "/scripts/alpaca_assets_ingest.py"]
              env:
                - name: ALPACA_API_KEY
                  valueFrom: { secretKeyRef: { name: alpaca-mcp-mcp-server-secrets, key: ALPACA_API_KEY } }
                - name: ALPACA_SECRET_KEY
                  valueFrom: { secretKeyRef: { name: alpaca-mcp-mcp-server-secrets, key: ALPACA_SECRET_KEY } }
                - { name: QID_DB_HOST, value: qid-tsdb-rw.qid.svc.cluster.local }
                - { name: QID_DB_PORT, value: "5432" }
                - name: QID_DB_NAME
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: dbname } }
                - name: QID_DB_USER
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: username } }
                - name: QID_DB_PASS
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: password } }
              volumeMounts:
                - { name: script, mountPath: /scripts }
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits:   { cpu: 500m, memory: 512Mi }
          volumes:
            - name: script
              configMap: { name: alpaca-assets-ingest-script, defaultMode: 0755 }
