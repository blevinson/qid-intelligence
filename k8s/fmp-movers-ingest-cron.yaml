# FMP movers snapshot → crucix_movers. Hourly during US trading hours.
# 30 mins past the hour: lets a full bar settle before snapshot.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fmp-movers-ingest
  namespace: qid
spec:
  schedule: "30 13-21 * * 1-5"   # 13:30-21:30 UTC = 9:30 AM-5:30 PM ET, weekdays
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: ingest
              image: ghcr.io/blevinson/qid-intelligence-bridge:claude-code-2026-04-30e
              command: ["python", "/scripts/fmp_movers_ingest.py"]
              env:
                - name: FMP_API_KEY
                  valueFrom: { secretKeyRef: { name: crucix-fmp, key: FMP_API_KEY } }
                - { name: QID_DB_HOST, value: qid-tsdb-rw.qid.svc.cluster.local }
                - { name: QID_DB_PORT, value: "5432" }
                - name: QID_DB_NAME
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: dbname } }
                - name: QID_DB_USER
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: username } }
                - name: QID_DB_PASS
                  valueFrom: { secretKeyRef: { name: qid-tsdb-app, key: password } }
              volumeMounts:
                - { name: script, mountPath: /scripts }
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits:   { cpu: 500m, memory: 512Mi }
          volumes:
            - name: script
              configMap: { name: fmp-movers-ingest-script, defaultMode: 0755 }
