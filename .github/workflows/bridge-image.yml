name: Build and push bridge image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile.bridge
      - backend/scripts/sec_*.py
      - backend/scripts/finnhub_*.py
      - backend/crucix_bridge.py

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push bridge image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.bridge
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/qid-intelligence-bridge:latest
